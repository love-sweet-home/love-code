<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>go 💗</title>
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body class="go-page">
<header class="home-top-header">
    <div class="home-header-content">
        <span class="home-header-title">🎀Memories🎀</span>
    </div>
    <button id="open-menu-btn" class="menu-open-button">MENU</button>
</header>

<div id="menu-modal" class="menu-overlay">
    <div class="menu-window">
        <h2 class="menu-title">Menu</h2>
        <ul class="menu-list">
            <li><a href="home.html">Home</a></li>
            <li><a href="date.html">Next Date</a></li>
            <li><a href="lets-go.html">Wish List</a></li>
            <li><a href="memories.html" class="current">Memories</a></li>
            <li><a href="#">Goals</a></li>
            <li><a href="#">Savings amount</a></li>
            <li><a href="#">Profile</a></li>
            <li><a href="#">Contact</a></li>
        </ul>
        <button id="close-btn" class="close-circle">×</button>
    </div>
</div>

<main>
    <p class="go-label">二人の思い出アルバム</p>

<div class="input-card">
    <input type="file" id="photo-file" accept="image/*" class="hidden-file-input">
    
    <label for="photo-file" class="cute-file-label">
        <span class="heart-icon"></span> 写真を選ぶ
    </label>

    <input type="text" id="photo-caption" placeholder="思い出のタイトル">
    <button onclick="uploadAndSave()" class="add-btn" id="upload-btn">保存</button>
</div>

    <div id="photo-gallery" class="gallery-container">
    </div>
</main>

<div class="bottom-lace"></div>
<div class="bottom-header"></div>

<script>
    const PHOTO_API_URL = "https://script.google.com/macros/s/AKfycbyNXoEBMwkmUQeKUWjvJAj8GkWss1g1TG0w0qI2YWTSC8e1xipSaFR1gJx0T5E5OUBH/exec";

    // メニューの基本設定
    const openBtn = document.getElementById('open-menu-btn');
    const closeBtn = document.getElementById('close-btn');
    const menuModal = document.getElementById('menu-modal');
    openBtn.onclick = () => menuModal.style.display = 'flex';
    closeBtn.onclick = () => menuModal.style.display = 'none';

    // 🌸 ページを開いた時に写真を読み込む
    window.onload = async function() {
        const gallery = document.getElementById('photo-gallery');
        gallery.innerHTML = "<p style='color:#ff85a1;'>アルバムを開いています...💕</p>";
        
        try {
            const response = await fetch(PHOTO_API_URL);
            const photos = await response.json();
            gallery.innerHTML = ""; 
            photos.reverse().forEach(data => displayPhoto(data));
        } catch (e) {
            gallery.innerHTML = "<p style='color:#ff85a1;'>読み込みに失敗しちゃった😢</p>";
        }
    };

    // 📸 写真をCloudinaryに送って保存する魔法
    async function uploadAndSave() {
        const fileInput = document.getElementById('photo-file');
        const capInput = document.getElementById('photo-caption');
        const btn = document.getElementById('upload-btn');

        if (!fileInput.files[0]) return alert("写真を選んでね！");

        btn.disabled = true;
        btn.innerText = "魔法をかけてます...✨";

        const formData = new FormData();
        formData.append('file', fileInput.files[0]);
        formData.append('upload_preset', 'my_album'); // 👈 Cloudinaryの設定名

        try {
            const cloudRes = await fetch('https://api.cloudinary.com/v1_1/dozgjlp9d/image/upload', {
                method: 'POST',
                body: formData
            });
            const cloudData = await cloudRes.json();
            const imageUrl = cloudData.secure_url; 

            await fetch(PHOTO_API_URL, {
                method: "POST",
                body: JSON.stringify({ url: imageUrl, caption: capInput.value })
            });

            location.reload(); 
        } catch (e) {
            alert("アップロードに失敗しちゃった😭");
            btn.disabled = false;
            btn.innerText = "アルバムに保存";
        }
    }

function displayPhoto(data) {
    const gallery = document.getElementById('photo-gallery');
    const frame = document.createElement('div');
    frame.className = 'photo-frame'; 
    frame.style.position = 'relative'; // 削除ボタンの基準にする
    
    const finalUrl = data.url;
    
    frame.innerHTML = `
        <div class="delete-overlay">
            <button class="delete-confirm-btn" onclick="deletePhoto('${finalUrl}')">消去する？💔</button>
        </div>
        <img src="${finalUrl}" class="main-photo" style="display:block;">
        <p class="photo-caption">${data.caption || 'No Title'}</p>
    `;

    // 💡 長押しの判定ロジック
    let pressTimer;
    
    // 指が触れたらタイマー開始
    frame.addEventListener('touchstart', () => {
        pressTimer = window.setTimeout(() => {
            frame.classList.add('show-delete'); // 1秒長押しでボタン表示
        }, 1000);
    });
    
    // 指が離れたらタイマー解除
    frame.addEventListener('touchend', () => {
        clearTimeout(pressTimer);
    });

    gallery.appendChild(frame);
}

// 🌸 本当に消しちゃう魔法
async function deletePhoto(url) {
    if (!confirm("本当にこの思い出を消しちゃう？😢")) return;
    
    try {
        await fetch(PHOTO_API_URL, {
            method: "POST",
            body: JSON.stringify({ method: "delete", url: url })
        });
        location.reload(); // 消したら画面を更新！
    } catch (e) {
        alert("消去に失敗しちゃった💦");
    }
}

    function doPost(e) {
  const params = JSON.parse(e.postData.contents);
  const sheet = SpreadsheetApp.getActiveSpreadsheet().getActiveSheet();
  
  // 💡 もし「delete」という命令が届いたら削除する
  if (params.method === "delete") {
    const data = sheet.getDataRange().getValues();
    for (let i = 0; i < data.length; i++) {
      // URLが一致する行を探して削除するぞ
      if (data[i][0] === params.url) {
        sheet.deleteRow(i + 1);
        return ContentService.createTextOutput(JSON.stringify({status: "success"}));
      }
    }
  }
  
  // (今までの保存用のコードもここにあるはず。なければ追加してな！)
}

</script>
</body>
</html>
